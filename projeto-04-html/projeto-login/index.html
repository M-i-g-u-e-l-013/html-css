<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="../imagens/Tec.png" type="image/x-icon">

    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <link rel="stylesheet" href="estilos/style.css">

</head>

<body>
    <main>
        <section id="login">

            <div id="imagem"></div>

            <div id="formulario">

                <h1>Login</h1>

                <p>
                    Seja Bem-Vindo(a) usuário, faça login para acessar sua conta :)
                </p>

                <form action="cadastro.php" method="post" autocomplete="on">

                    <div class="campo">

                        <label for="ilogin">
                            <i class="material-symbols-outlined">person</i>
                        </label>

                        <input 
                            type="email"
                            name="login"
                            id="ilogin"
                            placeholder="E-mail de login"
                            autocomplete="email"
                            required
                        >

                    </div>

                    <div class="campo">

                        <label for="isenha">
                            <i class="material-symbols-outlined">vpn_key</i>
                        </label>

                        <input 
                            type="password"
                            name="senha"
                            id="isenha"
                            placeholder="Senha de Login"
                            autocomplete="current-password"
                            required
                        >

                    </div>

                    <input type="submit" value="Entrar">

                    <a href="#">
                        Esqueci a senha
                    </a>

                </form>
            </div>

        </section>
    </main>
