<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/Tec.png" type="image/x-icon">
    <title>Exercicío 25 / C</title>
</head>
<body>
    <header>
        <h1>Testes em Formulários</h1>
    </header>
    <main>
        <form action="cadastros.py" method="post" autocomplete="off">
            <p>
                <label for="inome">Nome:</label>
                <input type="text" name="nome" id="inome" required placeholder="Nome do aluno:">
            </p>
            <p>
                <label for="idade">Idade:</label>
                <input type="number" name="idade" id="iidade" required placeholder="Idade do aluno:" min="0" max="100">
            </p>
            <p>
                <label for="Média">Média</label>
                <input type="number" name="média" id="imédia" required placeholder="Média do aluno:" min="0" max="10" step="0.1">
            </p>
            <p>
                <label for="imes">Perido Letivo</label>
                <input type="month" name="mes" id="imes" required>
            </p>
            <p>
                <label for="idia">Dia da prova</label>
                <input type="date" name="dia" id="idia" required>
            </p>
            <p>
                <label for="ihora">Horário da prova</label>
                <input type="time" name="hora" id="ihora">
            </p>
            <p>
                <input type="submit" value="Cadastrar">
                <input type="reset" value="Excluir">
            </p>
        </form>
    </main>
</body>
</html>
