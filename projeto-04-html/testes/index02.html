<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/Tec.png" type="image/x-icon">
    <title>testes.com</title>
    <link rel="stylesheet" href="estilos/estilo.css">
</head>
<body>
    <header>
        <h1>Formulários Modernos</h1>
        <p>Preencha seus dados abaixo para se cadastrar</p>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Curiosidades</a>
        <a href="#">Contato</a>
        <a href="#">Termos de uso</a>
    </nav>
    <main>
        <form action="cadastro.php" method="post" autocomplete="on">

            <fieldset>

                <legend>Dados Pessoais</legend>

                <div>
                    <label for="inome">Nome: </label>
                    <input type="text" name="nome" id="inome" required>
                </div>

                <div>
                    <label for="isobrenome">Sobrenome: </label>
                    <input type="text" name="sobrenome" id="isobrenome" readonly>
                </div>

                <div>
                    <label for="idade">Idade: </label>
                    <input type="number" name="idade" id="iidade" min="18" max="65" required>
                </div>

                <div>
                    <label for="iemail">E-mail: </label>
                    <input type="email" name="email" id="iemail" required>
                </div>

                <div>
                    <label for="isenha">Senha: </label>
                    <input type="password" name="senha" id="isenha" required>
                </div>

            </fieldset>

            <fieldset>

                <legend>Informações Extras</legend>

                <div>
                    <label for="idata">Data de nascimento: </label>
                    <input type="date" name="data" id="idata" required>
                </div>

                <div>
                    <label for="itelefone">Telefone: </label>
                    <input type="tel" name="telefone" id="itelefone" required placeholder=" (00) 00000-0000">
                </div>

                <div>
                    <label for="ipais">Pais: </label>
                    <select name="pais" id="ipais">
                        <option value="Brasil">Brasil</option>
                        <option value="Portugal">Portugal</option>
                        <option value="Angola">Angola</option>
                    </select>
                </div>

            </fieldset>

            <fieldset>
                
                <legend>Sexo</legend>

                <div>
                    <label for="sxmasculino"><b>Masculino</b></label>
                    <input type="radio" name="sexo" id="sxmasculino" required>
                </div>

                <div>
                    <label for="sxfeminino"><b>Feminino</b></label>
                    <input type="radio" name="sexo" id="sxfeminino" required>
                </div>
            </fieldset>

            <fieldset>

                <legend>Interesses Favoritos</legend>

                <div>
                    <input type="checkbox" name="Leitura" id="ileitura"> <label for="ileitura">Leitura</label>
                </div>

                <div>
                    <input type="checkbox" name="programação" id="iprogramação"> <label for="iprogramação">Programação</label>
                </div>

                <div>
                    <input type="checkbox" name="Musculação" id="imusculação"> <label for="imusculação">Musculação</label>
                </div>

                <div>
                    <input type="checkbox" name="jogos Eletronicos" id="ijogos"> <label for="ijogos">Jogos Eletronicos</label>
                </div>

            </fieldset>

            <fieldset>

                <legend>Mensagem</legend>

                <div>
                    <label for="imsg">Sobre Você: </label> <br>
                    <textarea id="msg" name="msg" rows="4" placeholder=" Escreva algo sobre você..."></textarea required>
                </div>
            </fieldset>

            <fieldset>
                
                <legend>Cor Favorita</legend>

                <div>
                    <label for="icor">Sua Cor Favorita: </label>
                    <input type="color" name="cor" id="icor">
                </div>
            </fieldset>

            <fieldset>

                <legend>Foto de Cadastro</legend>

                <div>
                   <input type="file" name="foto" id="ifoto">
                </div>
            </fieldset>

            <fieldset>

                <legend>Nivel de Satisfação</legend>

                <div>
                    <label for="inivel">Nivel de Satisfação da Pesquisa</label>
                    <input type="range" name="nivel" id="inivel">
                </div>
            </fieldset>

            <div class="botoes">
                <input type="submit" value="Cadastrar">
                <input type="reset" value="Excluir">
            </div>
        </form>
    </main>
    <footer>
        <p>© 2025 - Site criado para Estudos</p>
    </footer>
</body>
</html>
