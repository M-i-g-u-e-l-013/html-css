<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox.com</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(168, 213, 168);
        }

        header {
            background-color: rgb(7, 87, 7);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header > p {
            margin-top: 9px;
        }

        main > h1 {
            background-color: rgb(10, 90, 10);
        }

        main {
            background-color: rgb(22, 59, 22);
            height: 100vh;
            width: 100vw;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-flow: row nowrap;
        }

        section {
            background-color: rgb(16, 95, 16);
            text-align: center;
            font-size: small;
            color: white;
            height: 200px;
            width: 200px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Flexbox Centralizado</h1>
        <p>Centralização absoluta com Flexbox normalmente significa colocar um elemento exatamente no centro da tela</p>
    </header>
    <main>
        <section>
            <h1>Tela de Login</h1>
        </section>
    </main>
</body>
</html>
