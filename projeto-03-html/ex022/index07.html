<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../ex022/imagens/wallpaper006.jpg" type="image/x-icon">
    <title>Exercicío 22 / G</title>
    <style>
        #conteiner {
            background-image: url(../ex022/imagens/target001.png);
            background-size: 100% 100%;

            position: relative;
            height: 96vh;
            padding: 10px;
            background-color: purple;
        }

        #conteudo {
            background-image: url(../ex022/imagens/target001.png);
            position: absolute;
            height: 200px;
            width: 400px;
            background-color: yellow;
            margin: auto;

            left: 50%;
            top: 50%;

            transform: translate(-50% , -50%);
        }
    </style>
</head>
<body>
    <header>
        <h1>Alinhamento vertical</h1>
    </header>
    <section id="conteiner">
        <article id="conteudo">

        </article>
    </section>
</body>
</html>
