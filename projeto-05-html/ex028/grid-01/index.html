<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid.com</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(166, 222, 166);
        }

        div.conteiner {
            border: 3px solid black;
            height: 250px;
            display: grid;
            grid-template-columns: auto auto auto;
            grid-template-rows: auto auto auto;
            gap: 10px;
            align-items: normal;
            justify-items: normal;
            align-content: normal;
            justify-content: normal;
        }

        div.item {
            border: 3px solid red;
            font-weight: bold;
            text-align: center;
            padding: 5px;
        }

        header {
            background-color: green;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header > p {
            margin-top: 8px;
        }

        main {
            background-color: white;
            border-radius: 10px;
            height: 900px;
            max-width: 900px;
            border: 1px solid black;
            margin: 30px auto;
        }

        footer {
            background-color: green;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 7px;
        }

        nav {
            background-color: rgb(6, 103, 6);
            text-align: center;
            padding: 10px;
        }

        nav > a {
            font-weight: bold;
            color: white;
            margin: 12px;
            text-decoration: none;
        }

        nav > a:hover {
            background-color: rgb(16, 158, 16);
            padding: 10px;
            border-radius: 12px;
            transition: 0.5s;
        }
    </style>
</head>
<body>
    <header>
        <h1>Grid Layout</h1>
        <p>Grid Layout é um sistema de layout do CSS usado para organizar elementos em linhas e colunas.</p>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Contato</a>
        <a href="#">Termos de Uso</a>
        <a href="#">Fale Conosco</a>
    </nav>
    <main>
        <div class="conteiner">
            <div class="item">A</div>
            <div class="item">B</div>
            <div class="item">C</div>
            <div class="item">D</div>
            <div class="item">E</div>
            <div class="item">F</div>
            <div class="item">G</div>
            <div class="item">H</div>
            <div class="item">I</div>
        </div>
    </main>
    <footer>
        <p>© 2026 - Site Criado Para Estudos</p>
    </footer>
</body>
</html>
