<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulários.com</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background-color: rgb(192, 241, 192);
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            background-color: rgb(8, 92, 8);
            color: white;
            text-align: center;
            padding: 20px;
        }

        header > p {
            padding-top: 8px;
        }

        nav {
            background-color: rgb(2, 144, 2);
            text-align: center;
            padding: 10px;
            font-weight: bold;
        }

        nav > a {
            color: white;
            text-decoration: none;
            margin: 6px;
        }

        nav > a:hover {
            background-color: rgb(2, 182, 2);
            padding: 10px;
            border-radius: 10px;
        }

        main {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        form {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        fieldset {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 2px solid green;
        }

        legend {
            color: rgb(1, 115, 1);
            font-weight: bold;
            margin-bottom: 2px;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        input[type="tel"] {
            font-weight: bold;
            margin: 8px;
            width: 95%;
            padding: 8px;
            border-radius: 10px;
            border: 1px solid black;
            margin-bottom: 3px;
        }

        .botôes {
            margin: auto;
            text-align: center;
            
        }

        textarea{
            width: 95%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid black;
            margin-top:5px;
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 8px;
            border-radius: 10px;
            border: 1px solid black;
            margin-top: 5px;
            font-weight: bold;
        }

        .botôes input {
            margin: 10px;
            width: 80px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 1px solid black;
        }

        input[type="submit"] {
            background-color: green;
            font-weight: bold;
            border-radius: 10px;
            padding: 7px;
        }

        input[type="color"] {
            width: 100%;
            height: 20%;
            padding: 4px;
        }

        input[type="submit"]:hover {
            background-color: rgb(3, 97, 3);
        }

        input[type="reset"] {
            background-color: red;
            font-weight: bold;
            border-radius: 10px;
            padding: 7px;
        }

        input[type="reset"]:hover {
            background-color: rgb(169, 5, 5);
        }

        footer {
            background-color: green;
            padding: 8px;
            color: white;
            text-align: center;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <header>
        <h1>Formulários Modernos</h1>
        <p>Preencha seus dados abaixo para se cadastrar</p>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Curiosidades</a>
        <a href="#">Contato</a>
        <a href="#">Termos de uso</a>
    </nav>
    <main>
        <form action="cadastro.php" method="post" autocomplete="on">
            <fieldset>
                <legend>Dados Pessoais</legend>

                <div>
                    <label for="inome"><b>Nome:</b></label>
                    <input type="text" name="nome" id="inome" required placeholder="Nome Cadastrado:">
                </div>

                <div>
                    <label for="isobrenome"><b>Sobrenome:</b></label>
                    <input type="text" name="sobrenome" id="isobrenome" required placeholder="Sobrenome Cadastrado:">
                </div>

                <div>
                    <label for="Iidade"><b>Idade:</b></label>
                    <input type="number" name="idade" id="Iidade" required placeholder="Digite sua idade:" min="18" max="65">
                </div>

                <div>
                    <label for="iemail"><b>E-mail:</b></label>
                    <input type="email" name="email" id="iemail" required placeholder="E-mail de Login:">
                </div>

                <div>
                    <label for="isenha"><b>Senha:</b></label>
                    <input type="password" name="senha" id="isenha" required placeholder="Senha de Login:">
                </div>
            </fieldset>

            <fieldset>
                
                <legend>Informações Extras</legend>

                <div>
                    <label for="idata"><b>Data de nascimento:</b></label>
                    <input type="date" name="data" id="idata" required>
                </div>

                <div>
                    <label for="itel"><b>Telefone:</b></label>
                    <input type="tel" name="telefone" id="itel" required placeholder="(00) 00000-0000">
                </div>

                <div>
                    <label for="ipais"><b>Pais:</b></label>
                    <select name="pais" id="pais" required>
                    <option value="">Selecione seu país</option>
                    <option value="brasil">Brasil</option>
                    <option value="portugal">Portugal</option>
                    <option value="angola">Angola</option>
                    <option value="moçambique">Moçambique</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>

                <legend>Sexo</legend>

                <div>
                    <label for="sxmasculino"><b>Masculino</b></label>
                    <input type="radio" name="sexo" id="sxmasculino" required>
                </div>

                <div>
                    <label for="sxfeminino"><b>Feminino</b></label>
                    <input type="radio" name="sexo" id="sxfeminino" required>
                </div>
            </fieldset>

            <fieldset>
                
                <legend>Profissão</legend>

                <div>
                    <label for="iprof"><b>Profissão:</b> </label>
                    <input type="text" name="profissão" id="iprof" list="lstlista" required>
                    <datalist id="lstlista">
                        <option value="DEV">Desenvolvedor</option>
                        <option value="ADM">Administrador</option>
                        <option value="CONT">Contador</option>
                        <option value="PF">Policial</option>
                    </datalist>
                </div>
            </fieldset>

            <fieldset>
                
                <legend>Interesses favoritos</legend>

                <div>
                    <input type="checkbox" name="esportes" id="ileitura" value="leitura"> <label for="ileitura"><b>Leitura</b></label>
                </div>

                <div>
                    <input type="checkbox" name="esportes" id="ijogos" value="Jogos Eletronicos"> <label for="ijogos"><b>Jogos Eletronicos</b></label>
                </div>

                <div>
                    <input type="checkbox" name="esportes" id="imusculação" value="Musculação"> <label for="imusculação"><b>Musculação</b></label>
                </div>

                <div>
                    <input type="checkbox" name="esportes" id="iprogramação" value="Programação"> <label for="iprogramação"><b>Programação</b></label>
                </div>

                <div>
                    <input type="checkbox" name="esportes" id="icinema" value="Cinema e Séries"> <label for="icinema"><b>Cinema e Séries</b></label>
                </div>

                <div>
                    <input type="checkbox" name="esportes" id="iculi" value="Culinária"> <label for="iculi"><b>Culinária</b></label>
                </div>

                <div>
                    <input type="checkbox" name="esportes" id="imoda" value="Moda e Estilo"> <label for="imoda"><b>Moda e Estilo</b></label>
                </div>
            </fieldset>

            <fieldset>
                
                <legend>Mensagem</legend>

                <div>
                    <label for="ifale"><b>Sobre Você:</b></label>
                    <textarea id="msg" name="msg" rows="4" placeholder="Escreva algo sobre você..."></textarea required>
                </div>
            </fieldset>

            <fieldset>

                <legend>Cor Favorita</legend>

                <div>
                    <label for="icor"><b>Sua cor favorita:</b></label> <br>
                    <input type="color" name="cor" id="icolor" required>
                </div>
            </fieldset>

            <fieldset>

                <legend>Foto de Cadastro</legend>

                <div>
                    <input type="file" name="foto" id="ifoto" required>
                </div>

            </fieldset>

            <fieldset>

                <legend>Nivel de Satisfação</legend>

                <div>
                    <label for="inivel"><b>Nivel de Satisfação da Pesquisa</b></label>
                    <input type="range" name="nivel" id="inivel" required>
                </div>
            </fieldset>

            <div class="botôes">
                <input type="submit" value="Cadastrar">
                <input type="reset" value="Excluir">
            </div>
        </form>
    </main>
    <footer>
        <p>Site criado para estudos</p>
    </footer>
</body>
</html>
